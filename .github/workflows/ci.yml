name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src

      - name: Type-check (pyright)
        run: uv run pyright

      - name: Build distribution
        run: uv build

      - name: Import smoke test
        run: uv run python -c "import rapidata_mcp; rapidata_mcp.build_app(rapidata_mcp.Settings(auth_disabled=True))"
